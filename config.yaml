# ============================================================
# Predictive Maintenance Pro — Central Configuration
# ============================================================

project:
  name: "PredictiveMaintenance-Pro"
  version: "1.0.0"
  description: "Production-grade predictive maintenance using classical ML"

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_samples: "data/samples"
  models: "models"
  reports: "reports"
  figures: "reports/figures"
  mlruns: "mlruns"
  logs: "logs"

data:
  dataset_id: "FD001"         # NASA CMAPSS dataset suffix (FD001, FD002, FD003, FD004)
  n_sensors: 21               # Number of sensor channels
  n_op_settings: 3            # Operational setting dimensions
  random_state: 42
  rul_cap: 125                # Cap RUL at 125 cycles (industry standard)
  failure_horizon: 30         # Predict failure within this many cycles
  test_size: 0.2
  validation_size: 0.1

features:
  rolling_windows: [5, 10, 20, 30]     # Cycle windows for rolling stats
  lag_steps: [1, 3, 5, 10]            # Lag feature steps
  ewma_spans: [5, 10, 20]             # EWMA spans
  trend_window: 10                     # Window for slope calculation
  # Sensors that show meaningful degradation signal (0-indexed)
  # For FD001, sensors 2,3,4,7,8,9,11,12,13,14,15,17,20,21 are typically informative relative to all 21.
  informative_sensors: [1, 2, 3, 6, 7, 8, 10, 11, 12, 13, 14, 16, 19, 20]

models:
  # Models to train (classifier for binary failure prediction)
  classifiers:
    - name: "RandomForest"
      class: "RandomForestClassifier"
      params:
        n_estimators: 200
        max_depth: 15
        min_samples_leaf: 5
        class_weight: "balanced"
        random_state: 42
        n_jobs: -1

    - name: "XGBoost"
      class: "XGBClassifier"
      params:
        n_estimators: 300
        max_depth: 6
        learning_rate: 0.05
        subsample: 0.8
        colsample_bytree: 0.8
        scale_pos_weight: 3
        use_label_encoder: false
        eval_metric: "logloss"
        random_state: 42
        n_jobs: -1

    - name: "LightGBM"
      class: "LGBMClassifier"
      params:
        n_estimators: 300
        max_depth: 8
        learning_rate: 0.05
        subsample: 0.8
        colsample_bytree: 0.8
        class_weight: "balanced"
        random_state: 42
        n_jobs: -1
        verbose: -1

    - name: "GradientBoosting"
      class: "GradientBoostingClassifier"
      params:
        n_estimators: 200
        max_depth: 5
        learning_rate: 0.05
        subsample: 0.8
        random_state: 42

  # Regressor for RUL prediction
  regressors:
    - name: "XGBoost_RUL"
      class: "XGBRegressor"
      params:
        n_estimators: 300
        max_depth: 6
        learning_rate: 0.05
        subsample: 0.8
        random_state: 42
        n_jobs: -1

    - name: "RandomForest_RUL"
      class: "RandomForestRegressor"
      params:
        n_estimators: 200
        max_depth: 15
        random_state: 42
        n_jobs: -1

  cv_folds: 5
  best_model_metric: "roc_auc"     # Used to select champion model

evaluation:
  cost_matrix:                     # Business cost weights
    false_negative_cost: 100       # Missing a real failure (VERY expensive)
    false_positive_cost: 10        # Unnecessary maintenance (cheaper)
  classification_threshold: 0.5   # Default decision threshold
  optimal_threshold: true          # Find optimal threshold via Youden's J

monitoring:
  psi_threshold: 0.2               # PSI > 0.2 → significant drift
  ks_alpha: 0.05                   # KS test significance level

api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: false

mlflow:
  experiment_name: "predictive_maintenance"
  tracking_uri: "mlruns"
